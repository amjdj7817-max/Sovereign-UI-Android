workflows:
  android-build:
    name: Sovereign UI Android Build
    max_build_duration: 60
    instance_type: linux
    environment:
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install Gradle
        script: |
          apt-get update && apt-get install -y gradle
      - name: Generate Gradle Wrapper
        script: |
          gradle wrapper
      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - amjdj7817@gmail.com
